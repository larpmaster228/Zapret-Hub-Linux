name: Release Build (Linux)

on:
  push:
    tags:
      - "v*-linux"
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or release version (for example v3.0.0-linux)"
        required: true
        default: "v3.0.0-linux"
      release_name:
        description: "Release title"
        required: true
        default: "Zapret Hub 3.0.0 (Linux)"
      changelog:
        description: "Release changelog (optional)"
        required: false
        default: ""

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - id: v
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          if [ -z "$TAG" ] || ! echo "$TAG" | grep -qP '^v?\d'; then
            TAG="v3.0.0-linux"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libegl1 \
            libglib2.0-0 \
            libxkbcommon0 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxcb-xkb1 \
            rsync

      - name: Install Python dependencies
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller

      - name: Build Linux x64 portable
        run: VERSION="${{ needs.version.outputs.version }}" ./scripts/build_linux.sh

      - uses: actions/upload-artifact@v6
        with:
          name: release-linux-x64
          path: zapret_hub_*_linux_x64.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: .artifacts
          pattern: release-*
          merge-multiple: true

      - name: Stage release folder
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          RELEASE_DIR="release_${VERSION}"
          mkdir -p "$RELEASE_DIR"
          for f in .artifacts/zapret_hub_*.tar.gz; do
            [ -f "$f" ] || continue
            cp "$f" "$RELEASE_DIR/"
            echo "Staged $(basename "$f")"
          done
          ls -lh "$RELEASE_DIR/"

      - name: Read release notes
        id: release_notes
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          NOTES_PATH=".github/release-notes/${VERSION}.md"
          CHANGELOG="${{ inputs.changelog }}"
          if [ -f "$NOTES_PATH" ]; then
            BODY=$(cat "$NOTES_PATH")
          elif [ -n "$CHANGELOG" ]; then
            BODY="$CHANGELOG"
          else
            BODY="## Assets"
          fi
          {
            echo "body<<__ZAPRET_HUB_NOTES__"
            echo "$BODY"
            echo "__ZAPRET_HUB_NOTES__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: ${{ needs.version.outputs.tag }}
          body: ${{ steps.release_notes.outputs.body }}
          files: release_${{ needs.version.outputs.version }}/zapret_hub_*.tar.gz

  aur:
    name: Update AUR package
    needs: [version, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare PKGBUILD
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          TAG="${{ needs.version.outputs.tag }}"
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" aur/PKGBUILD
          sed -i "s|/download/v[0-9][0-9.]*[a-z]*\?/|/download/$TAG/|" aur/PKGBUILD
          echo "=== PKGBUILD ==="
          cat aur/PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: zapret-hub
          pkgbuild: ./aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "zapret-hub ${{ needs.version.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
