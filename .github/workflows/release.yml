name: Release Build

# Slim installer model (matches local build_nuitka_installer.ps1):
# - Job A/B: portable x64 / arm64 zips for the goshkow.ru mirror (and GitHub assets).
# - Job C: slim universal installer in parallel — embeds uninstallers only; downloads app at install time.
# - Final job: attach artifacts to the GitHub Release (no rebuild, no fat installer_payload).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or release version (for example v3.0.0)"
        required: true
        default: "v3.0.0"
      release_name:
        description: "Release title"
        required: true
        default: "Zapret Hub 3.0.0"
      changelog:
        description: "Release changelog"
        required: false
        default: ""

jobs:
  build-portable-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka, .\dist_installer, .\.nuitka_staging, .\installer_payload, .\release_* -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag -or $tag -notmatch '^v?\d') { $tag = "v3.0.0" }
          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Nuitka x64 portable
        shell: pwsh
        run: .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka -Compiler msvc

      - name: Build x64 uninstaller
        shell: pwsh
        run: .\scripts\build_nuitka_installer.ps1 -Python python -OutputDir dist_installer -UninstallerOnly -Compiler msvc

      - name: Package portable x64 zip
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          New-Item -ItemType Directory -Force -Path ".\release_$version" | Out-Null
          python .\scripts\prepare_nuitka_release.py `
            --x64-source .\dist_nuitka\main.dist `
            --release-dir ".\release_$version" `
            --version $version `
            --uninstaller-x64 .\dist_installer\uninstall_zaprethub.exe
          Copy-Item .\dist_installer\uninstall_zaprethub.exe ".\release_$version\uninstall_zaprethub_${version}_win_x64.exe" -Force

      - name: Upload portable x64 assets
        uses: actions/upload-artifact@v6
        with:
          name: release-portable-win-x64
          path: |
            release_${{ steps.meta.outputs.version }}/zapret_hub_${{ steps.meta.outputs.version }}_portable_win_x64.zip
            release_${{ steps.meta.outputs.version }}/uninstall_zaprethub_${{ steps.meta.outputs.version }}_win_x64.exe
          if-no-files-found: error

  build-portable-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka, .\dist_installer, .\.nuitka_staging, .\installer_payload, .\release_* -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Rust fallback
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag -or $tag -notmatch '^v?\d') { $tag = "v3.0.0" }
          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build Nuitka arm64 portable
        shell: pwsh
        run: .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka -Compiler msvc

      - name: Build arm64 uninstaller
        shell: pwsh
        run: .\scripts\build_nuitka_installer.ps1 -Python python -OutputDir dist_installer -UninstallerOnly -Compiler msvc

      - name: Package portable arm64 zip
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          New-Item -ItemType Directory -Force -Path ".\release_$version" | Out-Null
          python .\scripts\prepare_nuitka_release.py `
            --arm64-source .\dist_nuitka\main.dist `
            --release-dir ".\release_$version" `
            --version $version `
            --uninstaller-arm64 .\dist_installer\uninstall_zaprethub.exe
          Copy-Item .\dist_installer\uninstall_zaprethub.exe ".\release_$version\uninstall_zaprethub_${version}_win_arm64.exe" -Force

      - name: Upload portable arm64 assets
        uses: actions/upload-artifact@v6
        with:
          name: release-portable-win-arm64
          path: |
            release_${{ steps.meta.outputs.version }}/zapret_hub_${{ steps.meta.outputs.version }}_portable_win_arm64.zip
            release_${{ steps.meta.outputs.version }}/uninstall_zaprethub_${{ steps.meta.outputs.version }}_win_arm64.exe
          if-no-files-found: error

  build-slim-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Clean workspace
        shell: pwsh
        run: |
          Remove-Item .\dist_nuitka, .\dist_installer, .\.nuitka_staging, .\installer_payload, .\bundled_uninstaller, .\release_* -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag -or $tag -notmatch '^v?\d') { $tag = "v3.0.0" }
          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build slim installer (local parity)
        shell: pwsh
        run: |
          # Same as local: no -X64Source/-Arm64Source, no installer_payload app zips.
          # Runtime download is from goshkow.ru; CI must not embed portable builds.
          $version = "${{ steps.meta.outputs.version }}"
          .\scripts\build_nuitka_installer.ps1 `
            -Python python `
            -OutputDir dist_installer `
            -Version $version `
            -Compiler msvc `
            -SkipPrepareRelease

      - name: Upload slim installer
        uses: actions/upload-artifact@v6
        with:
          name: release-slim-installer
          path: dist_installer/install_zaprethub_${{ steps.meta.outputs.version }}_universal.exe
          if-no-files-found: error

  publish-release:
    needs:
      - build-portable-x64
      - build-portable-arm64
      - build-slim-installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag -or $tag -notmatch '^v?\d') { $tag = "v3.0.0" }
          $version = $tag.TrimStart("v")
          $name = "${{ inputs.release_name }}"
          if (-not $name) { $name = "Zapret Hub $version" }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: .artifacts
          pattern: release-*
          merge-multiple: true

      - name: Stage release folder
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $releaseDir = ".\release_$version"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $needed = @(
            "zapret_hub_${version}_portable_win_x64.zip",
            "zapret_hub_${version}_portable_win_arm64.zip",
            "install_zaprethub_${version}_universal.exe",
            "uninstall_zaprethub_${version}_win_x64.exe",
            "uninstall_zaprethub_${version}_win_arm64.exe"
          )
          foreach ($name in $needed) {
            $found = Get-ChildItem .\.artifacts -Recurse -File -Filter $name | Select-Object -First 1
            if (-not $found) { throw "Missing release asset: $name" }
            Copy-Item $found.FullName (Join-Path $releaseDir $name) -Force
            Write-Host "Staged $name ($([math]::Round($found.Length/1MB,1)) MB)"
          }
          # Guard: slim installer must not be a fat payload blob
          $installer = Get-Item (Join-Path $releaseDir "install_zaprethub_${version}_universal.exe")
          $maxMb = 120
          if ($installer.Length -gt ($maxMb * 1MB)) {
            throw "Installer looks fat ($([math]::Round($installer.Length/1MB,1)) MB > $maxMb MB). Slim build expected."
          }

      - name: Optional Authenticode signing
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $releaseDir = ".\release_$version"
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_BASE64)) {
            Write-Warning "WINDOWS_SIGNING_PFX_BASE64 is not configured; publishing unsigned Windows binaries."
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "zapret-hub-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_PFX_BASE64))
          $env:WINDOWS_SIGNING_PFX_PATH = $certificatePath
          $targets = @(
            (Join-Path $releaseDir "install_zaprethub_${version}_universal.exe"),
            (Join-Path $releaseDir "uninstall_zaprethub_${version}_win_x64.exe"),
            (Join-Path $releaseDir "uninstall_zaprethub_${version}_win_arm64.exe")
          )
          .\scripts\sign_windows_artifacts.ps1 -Files $targets -RequireSignature

      - name: Read release notes
        id: release_notes
        shell: pwsh
        env:
          INPUT_CHANGELOG: ${{ inputs.changelog }}
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $notesPath = ".\.github\release-notes\$version.md"
          $changelog = $env:INPUT_CHANGELOG
          if (Test-Path $notesPath) {
            $body = Get-Content $notesPath -Raw -Encoding UTF8
          } elseif (-not [string]::IsNullOrWhiteSpace($changelog)) {
            $body = $changelog.Trim()
          } else {
            $body = @(
              "## Assets",
              "- ``install_zaprethub_${version}_universal.exe`` — slim installer (downloads app from goshkow.ru)",
              "- ``zapret_hub_${version}_portable_win_x64.zip`` / ``_win_arm64.zip`` — portable builds for the mirror",
              "- ``uninstall_zaprethub_${version}_win_x64.exe`` / ``_win_arm64.exe`` — standalone uninstallers"
            ) -join "`n"
          }
          "body<<__ZAPRET_HUB_NOTES__" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "__ZAPRET_HUB_NOTES__" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            release_${{ steps.release_meta.outputs.version }}/install_zaprethub_${{ steps.release_meta.outputs.version }}_universal.exe
            release_${{ steps.release_meta.outputs.version }}/zapret_hub_${{ steps.release_meta.outputs.version }}_portable_win_x64.zip
            release_${{ steps.release_meta.outputs.version }}/zapret_hub_${{ steps.release_meta.outputs.version }}_portable_win_arm64.zip
            release_${{ steps.release_meta.outputs.version }}/uninstall_zaprethub_${{ steps.release_meta.outputs.version }}_win_x64.exe
            release_${{ steps.release_meta.outputs.version }}/uninstall_zaprethub_${{ steps.release_meta.outputs.version }}_win_arm64.exe