name: Release Build

# Mirrors local scripts:
# - portable-*: scripts/build_nuitka.ps1 (+ UninstallerOnly) then prepare_nuitka_release.py
# - installer: scripts/build_nuitka_installer.ps1 slim path (no -X64Source/-Arm64Source, no payload zips)
# - publish: attach artifacts to the GitHub Release (no rebuild)
#
# Compiler: MSVC on GitHub-hosted runners (ilammy/msvc-dev-cmd). Local may use mingw;
# MSVC is the more reliable default on Actions and matches ci.yml.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or release version (for example v3.0.0)"
        required: true
        default: "v3.0.0"
      release_name:
        description: "Release title"
        required: true
        default: "Zapret Hub 3.0.0"
      changelog:
        description: "Release changelog (optional; otherwise .github/release-notes/$version.md)"
        required: false
        default: ""

jobs:
  portable-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python deps
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag -or $tag -notmatch '^v?\d') { $tag = "v3.0.0" }
          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build portable app (local build_nuitka.ps1)
        shell: pwsh
        run: |
          .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka -Compiler msvc

      - name: Build uninstaller only
        shell: pwsh
        run: |
          .\scripts\build_nuitka_installer.ps1 -Python python -OutputDir dist_installer -UninstallerOnly -Compiler msvc

      - name: Zip portable x64
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          New-Item -ItemType Directory -Force -Path ".\release_$version" | Out-Null
          python .\scripts\prepare_nuitka_release.py `
            --x64-source .\dist_nuitka\main.dist `
            --release-dir ".\release_$version" `
            --version $version `
            --uninstaller-x64 .\dist_installer\uninstall_zaprethub.exe
          Copy-Item .\dist_installer\uninstall_zaprethub.exe `
            ".\release_$version\uninstall_zaprethub_${version}_win_x64.exe" -Force

      - uses: actions/upload-artifact@v6
        with:
          name: release-portable-win-x64
          path: |
            release_${{ steps.meta.outputs.version }}/zapret_hub_${{ steps.meta.outputs.version }}_portable_win_x64.zip
            release_${{ steps.meta.outputs.version }}/uninstall_zaprethub_${{ steps.meta.outputs.version }}_win_x64.exe
          if-no-files-found: error

  portable-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python deps
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag -or $tag -notmatch '^v?\d') { $tag = "v3.0.0" }
          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build portable app (local build_nuitka.ps1)
        shell: pwsh
        run: |
          .\scripts\build_nuitka.ps1 -Python python -OutputDir dist_nuitka -Compiler msvc

      - name: Build uninstaller only
        shell: pwsh
        run: |
          .\scripts\build_nuitka_installer.ps1 -Python python -OutputDir dist_installer -UninstallerOnly -Compiler msvc

      - name: Zip portable arm64
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          New-Item -ItemType Directory -Force -Path ".\release_$version" | Out-Null
          python .\scripts\prepare_nuitka_release.py `
            --arm64-source .\dist_nuitka\main.dist `
            --release-dir ".\release_$version" `
            --version $version `
            --uninstaller-arm64 .\dist_installer\uninstall_zaprethub.exe
          Copy-Item .\dist_installer\uninstall_zaprethub.exe `
            ".\release_$version\uninstall_zaprethub_${version}_win_arm64.exe" -Force

      - uses: actions/upload-artifact@v6
        with:
          name: release-portable-win-arm64
          path: |
            release_${{ steps.meta.outputs.version }}/zapret_hub_${{ steps.meta.outputs.version }}_portable_win_arm64.zip
            release_${{ steps.meta.outputs.version }}/uninstall_zaprethub_${{ steps.meta.outputs.version }}_win_arm64.exe
          if-no-files-found: error

  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Clean leftover payload dirs
        shell: pwsh
        run: |
          Remove-Item .\installer_payload, .\bundled_uninstaller, .\dist_installer -Recurse -Force -ErrorAction SilentlyContinue

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python deps
        shell: pwsh
        env:
          PIP_PREFER_BINARY: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve version
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag -or $tag -notmatch '^v?\d') { $tag = "v3.0.0" }
          $version = $tag.TrimStart("v")
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      # Identical to local slim: no -X64Source / -Arm64Source, no installer_payload zips.
      # Runtime and architecture-matching uninstaller are downloaded from goshkow.com.
      - name: Build slim installer (local build_nuitka_installer.ps1)
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          .\scripts\build_nuitka_installer.ps1 `
            -Python python `
            -OutputDir dist_installer `
            -Version $version `
            -Compiler msvc `
            -SkipUninstaller `
            -SkipPrepareRelease

      - name: Sanity-check installer size
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $installer = Get-Item ".\dist_installer\install_zaprethub_${version}_universal.exe"
          $mb = [math]::Round($installer.Length / 1MB, 1)
          Write-Host "Slim installer size: $mb MB (QtWebEngine UI + optional bundled uninstaller; no portable app zips)"
          # Compressed WebEngine installer is expected ~150-350MB.
          # >450MB usually means an embedded portable payload mistake.
          if ($installer.Length -gt (450MB)) {
            throw "Installer too large ($mb MB > 450 MB). Likely embedded app payload; slim build expected."
          }

      - uses: actions/upload-artifact@v6
        with:
          name: release-slim-installer
          path: dist_installer/install_zaprethub_${{ steps.meta.outputs.version }}_universal.exe
          if-no-files-found: error

  publish:
    needs:
      - portable-x64
      - portable-arm64
      - installer
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          if (-not $tag -or $tag -notmatch '^v?\d') { $tag = "v3.0.0" }
          $version = $tag.TrimStart("v")
          $name = "${{ inputs.release_name }}"
          if (-not $name) { $name = "Zapret Hub $version" }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          path: .artifacts
          pattern: release-*
          merge-multiple: true

      - name: Stage release folder
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $releaseDir = ".\release_$version"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Write-Host "Downloaded artifacts:"
          Get-ChildItem .\.artifacts -Recurse -File | ForEach-Object {
            Write-Host " - $($_.FullName.Substring((Resolve-Path .\.artifacts).Path.Length + 1))"
          }

          $required = @(
            "zapret_hub_${version}_portable_win_x64.zip",
            "zapret_hub_${version}_portable_win_arm64.zip",
            "install_zaprethub_${version}_universal.exe"
          )
          foreach ($name in $required) {
            $found = Get-ChildItem .\.artifacts -Recurse -File -Filter $name | Select-Object -First 1
            if (-not $found) { throw "Missing required release asset: $name" }
            Copy-Item $found.FullName (Join-Path $releaseDir $name) -Force
            Write-Host "Staged $name ($([math]::Round($found.Length/1MB,1)) MB)"
          }

          $optional = @(
            "uninstall_zaprethub_${version}_win_x64.exe",
            "uninstall_zaprethub_${version}_win_arm64.exe"
          )
          foreach ($name in $optional) {
            $found = Get-ChildItem .\.artifacts -Recurse -File -Filter $name | Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName (Join-Path $releaseDir $name) -Force
              Write-Host "Staged optional $name ($([math]::Round($found.Length/1MB,1)) MB)"
            } else {
              Write-Warning "Optional standalone uninstaller is absent: $name"
            }
          }

      - name: Optional Authenticode signing
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $releaseDir = ".\release_$version"
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_BASE64)) {
            Write-Warning "WINDOWS_SIGNING_PFX_BASE64 is not configured; publishing unsigned Windows binaries."
            exit 0
          }
          if (-not (Test-Path .\scripts\sign_windows_artifacts.ps1)) {
            Write-Warning "sign_windows_artifacts.ps1 missing; skipping signing."
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "zapret-hub-signing.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_SIGNING_PFX_BASE64))
          $env:WINDOWS_SIGNING_PFX_PATH = $certificatePath
          $targets = @((Join-Path $releaseDir "install_zaprethub_${version}_universal.exe"))
          $optionalTargets = @(
            (Join-Path $releaseDir "uninstall_zaprethub_${version}_win_x64.exe"),
            (Join-Path $releaseDir "uninstall_zaprethub_${version}_win_arm64.exe")
          )
          $targets += $optionalTargets | Where-Object { Test-Path -LiteralPath $_ }
          .\scripts\sign_windows_artifacts.ps1 -Files $targets -RequireSignature

      - name: Generate WinGet portable manifests
        shell: pwsh
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $tag = "${{ steps.release_meta.outputs.tag }}"
          $releaseDir = ".\release_$version"
          python .\scripts\generate_winget_manifests.py `
            --version $version `
            --x64-archive "$releaseDir\zapret_hub_${version}_portable_win_x64.zip" `
            --arm64-archive "$releaseDir\zapret_hub_${version}_portable_win_arm64.zip" `
            --output-dir "$releaseDir\winget" `
            --release-base-url "https://github.com/goshkow/Zapret-Hub/releases/download/$tag" `
            --bundle "$releaseDir\winget-manifests-${version}.zip"

      - name: Read release notes
        id: release_notes
        shell: pwsh
        env:
          INPUT_CHANGELOG: ${{ inputs.changelog }}
        run: |
          $version = "${{ steps.release_meta.outputs.version }}"
          $notesPath = ".\.github\release-notes\$version.md"
          $changelog = $env:INPUT_CHANGELOG
          if (Test-Path $notesPath) {
            $body = Get-Content $notesPath -Raw -Encoding UTF8
          } elseif (-not [string]::IsNullOrWhiteSpace($changelog)) {
            $body = $changelog.Trim()
          } else {
            $body = @(
              "## Assets",
              "- ``install_zaprethub_${version}_universal.exe`` - slim installer (downloads app from goshkow.com)",
              "- ``zapret_hub_${version}_portable_win_x64.zip`` / ``_win_arm64.zip`` - portable builds",
              "- ``uninstall_zaprethub_${version}_win_x64.exe`` / ``_win_arm64.exe`` - standalone uninstallers"
            ) -join "`n"
          }
          "body<<__ZAPRET_HUB_NOTES__" >> $env:GITHUB_OUTPUT
          $body >> $env:GITHUB_OUTPUT
          "__ZAPRET_HUB_NOTES__" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            release_${{ steps.release_meta.outputs.version }}/install_zaprethub_${{ steps.release_meta.outputs.version }}_universal.exe
            release_${{ steps.release_meta.outputs.version }}/zapret_hub_${{ steps.release_meta.outputs.version }}_portable_win_x64.zip
            release_${{ steps.release_meta.outputs.version }}/zapret_hub_${{ steps.release_meta.outputs.version }}_portable_win_arm64.zip
            release_${{ steps.release_meta.outputs.version }}/uninstall_zaprethub_${{ steps.release_meta.outputs.version }}_win_*.exe
            release_${{ steps.release_meta.outputs.version }}/winget-manifests-${{ steps.release_meta.outputs.version }}.zip
